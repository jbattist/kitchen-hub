<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kitchen Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>♫ Kitchen Hub</h1>
        <button type="button">Browse</button>
      </header>

      <section class="panel now-playing">
        <div class="album-art">Album Art</div>
        <div class="track-meta">
          <h2>Ready to connect to Spotify</h2>
          <p>Pick a Sonos room, then start playback from the playlist browser.</p>
        </div>
      </section>

      <section class="panel themes">
        <h2>Art Mode Themes</h2>
        <div class="theme-list">
          {% for theme in themes %}
          <span class="theme-pill">{{ theme.name }}</span>
          {% endfor %}
        </div>
      </section>
    </main>
  </body>
</html>
